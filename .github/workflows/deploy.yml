name: Deploy StemNest Academy

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Deploy frontend to S3 + invalidate CloudFront
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-west-2

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/ s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "*.html" \
            --exclude "*.json"
          # HTML files — no cache (always fresh)
          aws s3 sync frontend/ s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --cache-control "no-cache" \
            --include "*.html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ─────────────────────────────────────────────
  # JOB 2: Deploy backend to EC2
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → EC2
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/stemnest-academy

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            cd backend
            npm ci --omit=dev

            echo "🔄 Running migrations..."
            npm run migrate

            echo "🚀 Reloading API (zero downtime)..."
            pm2 reload stemnest-api --update-env

            echo "✅ Deployment complete!"
            pm2 status
